baseURL      = 'https://gibflow.gi/'
languageCode = 'en-gb'
title        = "GibFlow — Gibraltar's Smart Mobility App"
theme        = 'PaperMod'

# Rewrite root-relative URLs (/foo) to absolute URLs using baseURL.
# Required when the site is served from a subdirectory (e.g. /GibFlow/ on GitHub Pages).
canonifyURLs = true

# ── SEO ────────────────────────────────────────────────────────────────────────
enableRobotsTXT = true

[sitemap]
  changefreq = 'monthly'
  filename   = 'sitemap.xml'
  priority   = 0.5

[params]
  env    = 'production'
  author = 'GibFlow Team'

  description = "GibFlow brings real-time bus info, cycling routes, parking and local services together in one app — built for Gibraltar by people who know how the city moves."
  keywords    = ['Gibraltar app', 'Gibraltar transport', 'Gibraltar mobility', 'Gibraltar bus tracker', 'Gibraltar cycling', 'Gibraltar smart city', 'Gibraltar visitor guide']

  # Bunny Edge Script URL for the contact form.
  # After first deploy via release-on-bunny.yml, paste the script's public URL here.
  # e.g. "https://your-script-id.b-cdn.net"
  contactFormEndpoint = "https://gibflow-mailer-9wbzd.bunny.run/"

  # Open Graph / Twitter card image
  images = ['/inspiration/GibFlowBanner.jpg']

  # Theme controls
  defaultTheme       = 'auto'
  disableThemeToggle = false

  # Post display — mostly off for a product/marketing site
  ShowReadingTime     = false
  ShowCodeCopyButtons = false
  ShowShareButtons    = false
  ShowBreadCrumbs     = false
  ShowPostNavLinks    = false

  # [params.label] MUST come after all bare [params] keys.
  # In TOML, once a subtable header is opened, subsequent bare keys
  # belong to the subtable, not the parent. Keeping it last avoids that trap.
  [params.label]
    icon       = "inspiration/GibFlowLogo.jpg"
    iconHeight = 200
    text       = "Gibraltar's Smart Mobility App"

[menu]
  [[menu.main]]
    identifier = 'home'
    name       = 'Home'
    url        = '/'
    weight     = 10

  [[menu.main]]
    identifier = 'features'
    name       = 'Features'
    url        = '/#features'
    weight     = 20

  [[menu.main]]
    identifier = 'businesses'
    name       = 'For Businesses'
    url        = '/work-with-us/'
    weight     = 30

  [[menu.main]]
    identifier = 'early-access'
    name       = 'Get Early Access'
    url        = '/#early-access'
    weight     = 40

# ── Footer columns ────────────────────────────────────────────────────────────
# Drives the link columns in layouts/partials/footer.html.
# Three columns: navigation, legal, and support.
[params.footer]
  [params.footer.brand]
    tagline = "Gibraltar's smart mobility app — real-time bus info, secure cycle parking, and local navigation in one place."

[[params.footer.columns]]
  title = "Navigate"
  links = [
    {label = "Home",             url = "/"},
    {label = "Features",         url = "/#features"},
    {label = "For Businesses",   url = "/#for-businesses"},
    {label = "Work With Us",     url = "/work-with-us/"},
    {label = "Get Early Access", url = "/#early-access"},
  ]

[[params.footer.columns]]
  title = "Legal"
  links = [
    {label = "Privacy Policy",    url = "/privacy/"},
    {label = "Terms & Conditions", url = "/terms/"},
    {label = "Cookie Policy",     url = "/cookies/"},
  ]

[[params.footer.columns]]
  title = "Support"
  links = [
    {label = "Help Centre", url = "/help/"},
    {label = "Contact Us",  url = "/contact/"},
  ]

[build]
  writeStats = true

[markup.goldmark.renderer]
  # Allow raw HTML blocks in Markdown content pages.
  unsafe = true
