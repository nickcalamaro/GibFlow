baseURL      = 'https://gibflow.gi/'
languageCode = 'en-gb'
title        = "GibFlow — Gibraltar's Smart Mobility App"
theme        = 'PaperMod'

# ── SEO ────────────────────────────────────────────────────────────────────────
enableRobotsTXT = true

[params]
  env    = 'production'
  author = 'GibFlow Team'

  description = "GibFlow brings real-time bus info, cycling routes, parking and local services together in one app — built for Gibraltar by people who know how the city moves."
  keywords    = ['Gibraltar app', 'Gibraltar transport', 'Gibraltar mobility', 'Gibraltar bus tracker', 'Gibraltar cycling', 'Gibraltar smart city', 'Gibraltar visitor guide']

  # Open Graph / Twitter card image
  images = ['/inspiration/GibFlowBanner.jpg']

  # Theme controls
  defaultTheme       = 'auto'
  disableThemeToggle = false

  # Post display — mostly off for a product/marketing site
  ShowReadingTime     = false
  ShowCodeCopyButtons = false
  ShowShareButtons    = false
  ShowBreadCrumbs     = false
  ShowPostNavLinks    = false

[menu]
  [[menu.main]]
    identifier = 'home'
    name       = 'Home'
    url        = '/'
    weight     = 10

  [[menu.main]]
    identifier = 'features'
    name       = 'Features'
    url        = '/#features'
    weight     = 20

  [[menu.main]]
    identifier = 'businesses'
    name       = 'For Businesses'
    url        = '/#for-businesses'
    weight     = 30

  [[menu.main]]
    identifier = 'early-access'
    name       = 'Get Early Access'
    url        = '/#early-access'
    weight     = 40

[build]
  writeStats = true

[markup.goldmark.renderer]
  # Allow raw HTML blocks in Markdown content pages.
  unsafe = true
