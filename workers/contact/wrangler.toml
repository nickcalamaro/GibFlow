name               = "gibflow-contact"
main               = "worker.js"
compatibility_date = "2025-01-01"

# SMTP2GO_SECRET is a secret — never stored here.
# It is injected automatically by the GitHub Actions deploy-worker workflow,
# which reads it from the SMTP2GO_Secret GitHub repository secret.
#
# To set it manually via the CLI instead:
#   cd workers/contact
#   wrangler secret put SMTP2GO_SECRET
#
# After first deploy, your worker URL will be:
#   https://gibflow-contact.<your-cf-subdomain>.workers.dev
#
# To use a custom domain (e.g. https://contact.gibflow.gi), add a route in
# the Cloudflare dashboard: Workers & Pages → gibflow-contact → Custom Domains.
# Then update params.contactFormEndpoint in hugo.toml to match.
